<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-touch-fullscreen" content="yes">
<title>Mariner D-Line</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{background:#111E36;font-family:system-ui,-apple-system,sans-serif;color:#fff;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
#app{max-width:900px;margin:0 auto;min-height:100vh;background:#111E36;}
.header{background:#000;padding:10px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;}
.logo{height:52px;width:auto;}
.header-title{font-size:13px;font-weight:900;color:#C8A951;letter-spacing:2px;}
.header-sub{font-size:11px;color:#5A7AAA;}
.header-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.play-num{text-align:right;}
.play-num-label{font-size:10px;color:#5A7AAA;}
.play-num-val{font-size:24px;font-weight:900;color:#C8A951;}
.alert-badge{background:#4A0E0E;border:1px solid #C0392B;border-radius:8px;padding:4px 10px;font-size:11px;color:#FF8080;font-weight:700;line-height:1.5;}
.content{padding:12px 14px;padding-bottom:84px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:900px;background:#1B2A4A;border-top:2px solid rgba(200,169,81,0.27);display:flex;}
.nav-btn{flex:1;padding:12px 0;background:none;border:none;border-top:2px solid transparent;color:#6A8AAA;transition:all 0.15s;}
.nav-btn.active{background:#1E3A5F;border-top-color:#C8A951;color:#C8A951;}
.nav-label{font-size:13px;font-weight:700;}
.nav-sub{font-size:10px;opacity:0.7;}
.card{background:#1E3560;border:1px solid #2E4A80;border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.gold{color:#C8A951;}
.btn-gold{background:#C8A951;color:#111E36;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;}
.btn-dark{background:#0D1A30;color:#AAA;border:1px solid #333;border-radius:10px;cursor:pointer;}
.row{display:flex;gap:8px;align-items:center;}
.col{display:flex;flex-direction:column;}
@keyframes slowpulse{0%,100%{border-color:#2A5030;box-shadow:none}50%{border-color:#4CAF50;box-shadow:0 0 14px rgba(76,175,80,0.33)}}
@keyframes flashbg{0%,100%{opacity:1}40%{opacity:0.35}}
.pulse{animation:slowpulse 2s infinite;}
.flash{animation:flashbg 0.4s ease 2;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.67);z-index:200;display:flex;align-items:flex-end;}
.sheet{width:100%;max-width:900px;margin:0 auto;background:#152340;border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 16px 50px;max-height:78vh;overflow-y:auto;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#1A2F50;border:1px solid #2E4A80;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.pos-cards{display:flex;gap:8px;}
.pos-card{background:#1A2F50;border:2px solid #2A3E60;border-radius:12px;padding:12px 8px 20px;cursor:pointer;flex:1;min-width:0;position:relative;overflow:hidden;transition:all 0.15s;}
.pos-card.open{background:#2A1F60;border-color:#C8A951;box-shadow:0 0 18px rgba(200,169,81,0.47);}
.pos-card.red{background:#4A0E0E;border-color:#C0392B;box-shadow:0 0 12px rgba(192,57,43,0.33);}
.pos-card.amber{background:#5C3010;border-color:#E67E22;}
.progress-bar{position:absolute;bottom:0;left:0;right:0;height:5px;background:#0A1428;}
.progress-fill{height:100%;transition:width 0.3s;}
.sit-bar{background:#1E3560;border:1px solid #2E4A80;border-radius:12px;padding:10px;display:flex;gap:6px;margin-bottom:12px;}
.sit-cell{flex:1;display:flex;flex-direction:column;align-items:center;background:#0D1A30;border-radius:8px;padding:6px 2px;}
.sit-label{font-size:9px;color:#6A8AAA;font-weight:700;letter-spacing:1px;}
.sit-val{font-size:24px;font-weight:900;line-height:1.1;}
.yard-cell{flex:1.8;display:flex;flex-direction:column;align-items:center;background:#0D1A30;border-radius:8px;padding:6px 4px;}
.yard-cell.rz{background:#3A0A0A;}
.rz-badge{font-size:8px;color:#E67E22;font-weight:700;letter-spacing:1px;}
.special-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.sp-btn{flex:1;padding:13px 0;border-radius:12px;font-weight:700;font-size:13px;}
input[type=text]{background:#0D1A30;border:1px solid #2E4A80;border-radius:8px;color:#fff;font-size:16px;padding:12px 14px;width:100%;outline:none;display:block;margin-top:6px;}
.seg{display:flex;border-radius:8px;overflow:hidden;border:1px solid #2E4A80;}
.seg button{flex:1;padding:10px 0;font-weight:700;font-size:14px;border:none;}
</style>
</head>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const POS = ['FE','DT','N','BE'];
const GOLD='#C8A951', RED='#C0392B', AMBER='#E67E22', GREEN='#27AE60';
const NAVYD='#111E36', CARD='#1E3560', BRD='#2E4A80';

const S = {
  tab: 'game',
  roster: [],
  onField: {FE:null, DT:null, N:null, BE:null},
  streak: {},
  total: {},
  log: [],
  playNum: 1,
  drive: 1,
  down: 1,
  dist: 10,
  absPos: 65,
  phase: 'normal', // normal | result | fg_prompt | punt_setup | turnover_setup
  puntPos: 65,
  turnPos: 65,
  resultYds: 0,
  showCloser: false,
  assignPos: null,
  editId: null,
  showAdd: false,
  showReset: false,
  formName: '', formPosition: 'FE', formLimit: 6, formCloser: false,
};

// ── Persist ───────────────────────────────────────────────────────────────────
const PERSIST_KEYS = ['roster','onField','streak','total','log','playNum','drive','down','dist','absPos','phase','puntPos','turnPos'];
function saveAll(){
  PERSIST_KEYS.forEach(k=>{
    try{localStorage.setItem('mm_'+k, JSON.stringify(S[k]));}catch(e){}
  });
}
function loadAll(){
  PERSIST_KEYS.forEach(k=>{
    try{
      const v = localStorage.getItem('mm_'+k);
      if(v != null) S[k] = JSON.parse(v);
    }catch(e){}
  });
}

// ── Yard line helpers ─────────────────────────────────────────────────────────
function absDisplay(a){
  if(a<=0)return'EZ'; if(a>=100)return'SAF';
  if(a===50)return'50';
  return a<50 ? '+'+a : '-'+(100-a);
}
function absLabel(a){
  if(a===50)return'50 (Mid)';
  return a<50 ? '+'+a : '-'+(100-a);
}
function isRZ(a){return a<=20;}
function yardColor(a){
  if(a<=20)return RED; if(a<50)return'#FF8080';
  if(a===50)return GOLD; return'#6ECC70';
}
function absAfterGain(a,yds){return Math.min(99,Math.max(0,a-yds));}
function flipPos(a){return a===50?50:100-a;}
function yn(a){return a===50?50:a<50?a:100-a;}

// ── Player helpers ────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function getP(id){return S.roster.find(p=>p.id===id);}
function getLimit(id){const p=getP(id);return p?p.limit||6:6;}
function getStreak(id){return S.streak[id]||0;}
function getTotal(id){return S.total[id]||0;}
function getStatus(id){
  if(!id)return'empty';
  const s=getStreak(id),lim=getLimit(id);
  if(s>=lim)return'red';
  if(s>=lim-2)return'amber';
  return'ok';
}
function fieldIds(){return Object.values(S.onField);}
function closerBench(){return S.roster.filter(p=>p.closer&&!fieldIds().includes(p.id));}
function closerPulse(){return S.down===4||(S.down===3&&S.dist>=7)||isRZ(S.absPos);}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(text,color,bg,ms=2200){
  const el=document.getElementById('toast-container');
  el.innerHTML=`<div class="flash" style="background:${bg};border:2px solid ${color};border-radius:12px;padding:14px;text-align:center;font-size:17px;font-weight:900;color:${color};">${text}</div>`;
  setTimeout(()=>{if(el)el.innerHTML='';},ms);
}

// ── Log play ──────────────────────────────────────────────────────────────────
function doLogPlay(type='normal'){
  const entry={
    n:S.playNum, drive:S.drive, down:S.down, dist:S.dist,
    yard:absLabel(S.absPos), type,
    FE: getP(S.onField.FE)?.name||'—',
    DT: getP(S.onField.DT)?.name||'—',
    N:  getP(S.onField.N )?.name||'—',
    BE: getP(S.onField.BE)?.name||'—',
  };
  S.log.push(entry);
  POS.forEach(pos=>{
    if(S.onField[pos]){
      const id=S.onField[pos];
      S.streak[id]=(S.streak[id]||0)+1;
      S.total[id]=(S.total[id]||0)+1;
    }
  });
  S.playNum++;
}

// ── New drive ─────────────────────────────────────────────────────────────────
function newDrive(newPos=null){
  S.drive++;
  S.down=1; S.dist=10;
  if(newPos!=null)S.absPos=newPos;
  S.resultYds=0; S.phase='normal'; S.showCloser=false;
}

// ── Pull player (streak reset) ────────────────────────────────────────────────
function pullPlayer(pos){
  const id=S.onField[pos];
  if(id) S.streak[id]=0;
  S.onField[pos]=null;
  S.assignPos=null;
}

// ── Assign player ─────────────────────────────────────────────────────────────
function assignPlayer(pos,id){
  // Reset streak of whoever is being replaced in this slot
  const outgoing=S.onField[pos];
  if(outgoing && outgoing!==id) S.streak[outgoing]=0;
  // If the incoming player was in another slot, reset that slot too
  POS.forEach(p=>{
    if(S.onField[p]===id && p!==pos){
      S.onField[p]=null;
      // no streak reset here — player is just moving positions, not being pulled
    }
  });
  S.onField[pos]=id;
  S.assignPos=null;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function logPlay(){
  if(S.phase!=='normal')return;
  doLogPlay('normal');
  S.resultYds=0; S.phase='result';
  saveAll(); render();
}

function applyResult(){
  const newAbs=absAfterGain(S.absPos,S.resultYds);
  if(newAbs<=0){
    // TD — auto log EP then new drive
    S.absPos=3;
    toast('TOUCHDOWN ALLOWED — EP logged','#FF6060','#3A0A0A',2500);
    S.resultYds=0; S.phase='normal';
    doLogPlay('EP');
    setTimeout(()=>{newDrive(70);saveAll();render();},400);
    saveAll(); render(); return;
  }
  S.absPos=newAbs;
  if(S.resultYds>=S.dist){
    S.down=1; S.dist=10;
  } else {
    const nd=S.down+1;
    if(nd>4){
      toast('TURNOVER ON DOWNS','#FF8080','#3A0A0A',2200);
      S.resultYds=0; S.phase='normal';
      setTimeout(()=>{newDrive(newAbs);saveAll();render();},600);
      saveAll(); render(); return;
    }
    S.down=nd; S.dist=Math.max(1,S.dist-S.resultYds);
  }
  S.resultYds=0; S.phase='normal';
  saveAll(); render();
}

function doPunt(){doLogPlay('PUNT');S.puntPos=Math.min(95,S.absPos+40);S.phase='punt_setup';S.resultYds=0;saveAll();render();}
function confirmPunt(){toast('Punt — new drive','#8AAAD0','#0D2040',2000);newDrive(S.puntPos);saveAll();render();}

function doFG(){doLogPlay('FG ATT');S.phase='fg_prompt';saveAll();render();}
function fgMade(){doLogPlay('FG-PAT');toast('FG Made — new drive','#FF8080','#3A0A0A',2000);newDrive(70);saveAll();render();}
function fgMissed(){toast('FG Missed — our ball','#6ECC70','#0A2010',2000);newDrive(S.absPos);saveAll();render();}

function doTurnover(type){doLogPlay(type);S.turnPos=S.absPos;S.phase='turnover_setup';saveAll();render();}
function confirmTurnover(){toast('Turnover — our ball','#6ECC70','#0A2010',2000);newDrive(S.turnPos);saveAll();render();}

function doFourthFail(){toast('Turnover on downs','#FF8080','#3A0A0A',2200);setTimeout(()=>{newDrive(S.absPos);saveAll();render();},500);saveAll();render();}

function resetGame(){
  S.onField={FE:null,DT:null,N:null,BE:null};
  S.streak={}; S.total={}; S.log=[];
  S.playNum=1; S.drive=1; S.down=1; S.dist=10; S.absPos=65;
  S.phase='normal'; S.resultYds=0; S.showCloser=false;
  S.showReset=false;
  saveAll(); render();
}

// ── Render header ─────────────────────────────────────────────────────────────
function renderHeader(){
  document.getElementById('hdr-play').textContent='#'+S.playNum;
  const rc=POS.filter(p=>getStatus(S.onField[p])==='red').length;
  const ac=POS.filter(p=>getStatus(S.onField[p])==='amber').length;
  const badge=document.getElementById('hdr-alert');
  if(rc>0||ac>0){
    badge.style.display='block';

    btn.className='nav-btn'+(S.tab===t?' active':'');
  });
}

// ── Render position card ──────────────────────────────────────────────────────
function renderPCard(pos){
  const id=S.onField[pos], p=id?getP(id):null;
  const s=getStatus(id), str=id?getStreak(id):0, lim=id?getLimit(id):1;
  const tot=id?getTotal(id):0;
  const pct=id?Math.min(str/lim,1):0;
  const isOpen=S.assignPos===pos;
  const fillColor=s==='red'?RED:s==='amber'?AMBER:GREEN;
  const cardClass='pos-card'+(isOpen?' open':s==='red'?' red':s==='amber'?' amber':'');
  const icon=isOpen?'▼':s==='red'?'🔴':s==='amber'?'🟡':p?.closer?'⭐':'';
  const nameColor=s==='red'?'#FF6B6B':s==='amber'?'#FFB347':'#fff';
  const countColor=s==='red'?RED:s==='amber'?AMBER:'#8AAAD0';

  return `<div class="${cardClass}" onclick="tapSlot('${pos}')">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct*100}%;background:${fillColor};"></div></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span style="font-size:11px;font-weight:700;color:${GOLD};letter-spacing:1px;">${pos}</span>
      <span style="font-size:13px;">${icon}</span>
    </div>
    ${p ? `
      <div style="font-size:16px;font-weight:700;color:${nameColor};line-height:1.1;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="font-size:12px;font-weight:700;color:${countColor};">${str}<span style="font-size:10px;opacity:0.6;font-weight:400;">/${lim} streak</span></div>
      <div style="font-size:11px;color:#4A6A9A;">${tot} total</div>
    ` : `<div style="font-size:13px;color:#3A5580;font-weight:600;padding-top:4px;">Tap to<br>assign</div>`}
  </div>`;
}

// ── Render yard setter ────────────────────────────────────────────────────────
// Design: 2 taps max. Tap 1 = side (+ or −). Tap 2 = yard number from big grid.
// Fine stepper available for exact numbers not on grid.
// No red/green on setter — neutral colors only.
function renderYardSetter(val, changeFunc, label){
  const isPlus=val<50, isMid=val===50;
  const ynv=yn(val);
  // Side toggle colors — gold = active, dark = inactive, no red/green
  const plusBg=isPlus?'#2A1E00':'#0D1A30';
  const plusColor=isPlus?GOLD:'#4A6A9A';
  const minusBg=(!isPlus&&!isMid)?'#1A2040':'#0D1A30';
  const minusColor=(!isPlus&&!isMid)?'#8AAAD0':'#4A6A9A';
  const midBg=isMid?'#1A2A3A':'#0D1A30';
  const midColor=isMid?'#AAD0FF':'#4A6A9A';
  // Current display — gold always, no danger coloring on setter
  const displayVal=isMid?'50':isPlus?`+${ynv}`:`-${ynv}`;
  // Grid: 5,10,15,20,25 / 30,35,40,45,Mid — 2 rows of 5
  const gridNums=[5,10,15,20,25,30,35,40,45,50];
  const gridBtns=gridNums.map(y=>{
    const active=(val<50&&val===y)||(val>50&&100-val===y)||(val===50&&y===50);
    const lbl=y===50?'Mid':y;
    return `<button onclick="${changeFunc}_quick(${y})" style="flex:1;padding:14px 0;border-radius:10px;font-weight:700;font-size:15px;border:none;background:${active?'#1E3A60':'#0D1A30'};color:${active?GOLD:'#5A7AAA'};">${lbl}</button>`;
  });
  const row1=gridBtns.slice(0,5).join('');
  const row2=gridBtns.slice(5,10).join('');
  return `
    <div class="card" style="margin-bottom:0;">
      ${label?`<div style="font-size:10px;font-weight:700;color:${GOLD};letter-spacing:1px;margin-bottom:12px;">${label}</div>`:''}
      <!-- Side toggle: big + and − buttons -->
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button onclick="${changeFunc}_setside('plus')" style="flex:1;padding:16px 0;font-weight:900;font-size:24px;border:none;border-radius:10px;background:${plusBg};color:${plusColor};">+</button>
        <button onclick="${changeFunc}_setside('mid')" style="flex:0.6;padding:16px 0;font-weight:700;font-size:14px;border:none;border-radius:10px;background:${midBg};color:${midColor};">Mid<br><span style="font-size:11px;opacity:0.7;">50</span></button>
        <button onclick="${changeFunc}_setside('minus')" style="flex:1;padding:16px 0;font-weight:900;font-size:24px;border:none;border-radius:10px;background:${minusBg};color:${minusColor};">−</button>
      </div>
      <!-- Current value + fine stepper -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;background:#0D1A30;border-radius:10px;padding:8px 12px;">
        <button onclick="${changeFunc}_dec()" style="background:#1A2A40;color:#8AAAD0;border:none;border-radius:8px;padding:12px 18px;font-size:24px;font-weight:700;">−</button>
        <div style="flex:1;text-align:center;">
          <span style="font-size:38px;font-weight:900;color:${GOLD};">${displayVal}</span>
          <div style="font-size:11px;color:#5A7AAA;margin-top:2px;">yard line</div>
        </div>
        <button onclick="${changeFunc}_inc()" style="background:#1A2A40;color:#8AAAD0;border:none;border-radius:8px;padding:12px 18px;font-size:24px;font-weight:700;">+</button>
      </div>
      <!-- Grid row 1 -->
      <div style="display:flex;gap:6px;margin-bottom:6px;">${row1}</div>
      <!-- Grid row 2 -->
      <div style="display:flex;gap:6px;">${row2}</div>
    </div>`;
}

// Yard setter action functions
// setside: 'plus' = their territory (offense close), 'minus' = our territory, 'mid' = 50
function _setSide(key, side){
  if(side==='mid'){S[key]=50;}
  else if(side==='plus'){if(S[key]===50||S[key]>50)S[key]=Math.min(49,100-S[key]===50?20:100-S[key]);}
  else{if(S[key]===50||S[key]<50)S[key]=Math.max(51,100-S[key]===50?80:100-S[key]);}
  if(S[key]===50 && side!=='mid')S[key]=side==='plus'?20:80;
  saveAll();render();
}
function _setQuick(key, y){
  if(y===50){S[key]=50;}
  else if(S[key]<50)S[key]=y;   // currently + side, stay +
  else S[key]=100-y;             // currently − side, stay −
  saveAll();render();
}
function mainPos_setside(s){_setSide('absPos',s);}
function mainPos_dec(){S.absPos=S.absPos===50?49:Math.max(1,S.absPos-1);saveAll();render();}
function mainPos_inc(){S.absPos=S.absPos===50?51:Math.min(99,S.absPos+1);saveAll();render();}
function mainPos_quick(y){_setQuick('absPos',y);}
function puntPos_setside(s){_setSide('puntPos',s);}
function puntPos_dec(){S.puntPos=S.puntPos===50?49:Math.max(1,S.puntPos-1);saveAll();render();}
function puntPos_inc(){S.puntPos=S.puntPos===50?51:Math.min(99,S.puntPos+1);saveAll();render();}
function puntPos_quick(y){_setQuick('puntPos',y);}
function turnPos_setside(s){_setSide('turnPos',s);}
function turnPos_dec(){S.turnPos=S.turnPos===50?49:Math.max(1,S.turnPos-1);saveAll();render();}
function turnPos_inc(){S.turnPos=S.turnPos===50?51:Math.min(99,S.turnPos+1);saveAll();render();}
function turnPos_quick(y){_setQuick('turnPos',y);}

function adjustResult(delta){S.resultYds+=delta;saveAll();render();}
function setResult(y){S.resultYds=y;saveAll();render();}

function tapSlot(pos){
  S.assignPos=S.assignPos===pos?null:pos;
  saveAll();render();
}

// ── GAME TAB ──────────────────────────────────────────────────────────────────
function renderGame(){
  const isNormal=S.phase==='normal';
  const isResult=S.phase==='result';
  let html='';

  // FG prompt
  if(S.phase==='fg_prompt'){
    html+=`<div style="background:#1A2040;border:2px solid ${GOLD};border-radius:14px;padding:16px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;color:${GOLD};margin-bottom:14px;">FIELD GOAL ATTEMPT LOGGED — Result?</div>
      <div style="display:flex;gap:10px;">
        <button onclick="fgMade()" style="flex:1;padding:16px 0;background:#2A0A0A;border:1px solid ${RED};border-radius:10px;color:#FF8080;font-weight:700;font-size:15px;">✗ MADE — New Drive</button>
        <button onclick="fgMissed()" style="flex:1;padding:16px 0;background:#0A2A10;border:1px solid #4CAF50;border-radius:10px;color:#6ECC70;font-weight:700;font-size:15px;">✓ MISSED — Our Ball</button>
      </div></div>`;
  }

  // Punt setup
  if(S.phase==='punt_setup'){
    html+=`<div style="background:#0D2A40;border:2px solid ${GOLD};border-radius:14px;padding:16px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;color:${GOLD};margin-bottom:12px;">PUNT LOGGED — Where did ball land?</div>
      ${renderYardSetter(S.puntPos,'puntPos',null)}
      <button onclick="confirmPunt()" style="width:100%;margin-top:10px;padding:14px 0;background:${GOLD};color:${NAVYD};border:none;border-radius:10px;font-weight:700;font-size:15px;">CONFIRM — NEW DRIVE</button>
      </div>`;
  }

  // Turnover setup
  if(S.phase==='turnover_setup'){
    html+=`<div style="background:#0A2A10;border:2px solid #4CAF50;border-radius:14px;padding:16px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;color:#6ECC70;margin-bottom:12px;">TURNOVER — Where does our offense take over?</div>
      ${renderYardSetter(S.turnPos,'turnPos',null)}
      <button onclick="confirmTurnover()" style="width:100%;margin-top:10px;padding:14px 0;background:#6ECC70;color:#0A1E10;border:none;border-radius:10px;font-weight:700;font-size:15px;">CONFIRM — NEW DRIVE</button>
      </div>`;
  }

  // Situation bar
  if(isNormal||isResult){
    const ydCol=yardColor(S.absPos);
    html+=`<div class="sit-bar">
      <div class="sit-cell"><span class="sit-label">DRIVE</span><span class="sit-val" style="color:${GOLD};">${S.drive}</span></div>
      <div class="sit-cell"><span class="sit-label">DOWN</span><span class="sit-val" style="color:#fff;">${S.down}</span></div>
      <div class="sit-cell"><span class="sit-label">DIST</span><span class="sit-val" style="color:#fff;">${S.dist}</span></div>
      <div class="yard-cell${isRZ(S.absPos)?' rz':''}">
        <span class="sit-label">YARD LINE</span>
        <span style="font-size:26px;font-weight:900;color:${ydCol};line-height:1.1;">${absDisplay(S.absPos)}</span>
        ${isRZ(S.absPos)?'<span class="rz-badge">RED ZONE</span>':''}
      </div></div>`;
  }

  // Closer alert
  const cb=closerBench();
  if(isNormal&&closerPulse()&&cb.length>0){
    const label=S.down===4?'4TH DOWN':isRZ(S.absPos)?'RED ZONE':'3RD & LONG';
    const closerCards=cb.map(p=>{
      const s=getStatus(p.id),str=getStreak(p.id),lim=getLimit(p.id),tot=getTotal(p.id);
      return `<div style="background:#0A1E10;border:1px solid ${s==='red'?RED:'#4CAF50'};border-radius:8px;padding:10px 14px;font-size:14px;font-weight:700;color:${s==='red'?'#FF8080':'#6ECC70'};display:inline-flex;gap:6px;align-items:center;">
        ⭐ ${p.name} <span style="font-size:11px;opacity:0.7;">(${str}/${lim} · ${tot} tot)</span>${s==='red'?' 🔴':''}
      </div>`;
    }).join('');
    html+=`<div onclick="S.showCloser=!S.showCloser;saveAll();render();" style="background:${S.showCloser?'#1A3020':'#0F2015'};border:2px solid ${S.showCloser?'#4CAF50':'#2A5030'};border-radius:12px;padding:12px 16px;cursor:pointer;margin-bottom:12px;${S.showCloser?'':'animation:slowpulse 2s infinite;'}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="color:#6ECC70;font-weight:700;font-size:14px;">⭐ ${label} — CLOSER AVAILABLE</span>
        <span style="color:#6ECC70;">${S.showCloser?'▲':'▼'}</span>
      </div>
      ${S.showCloser?`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">${closerCards}<div style="width:100%;font-size:11px;color:rgba(76,175,80,0.4);margin-top:4px;">Tap a position slot to sub in</div></div>`:''}
    </div>`;
  }

  // Position cards
  html+=`<div class="pos-cards" style="margin-bottom:12px;">${POS.map(p=>renderPCard(p)).join('')}</div>`;

  // Result panel
  if(isResult){
    const ry=S.resultYds;
    const nextDown=S.down+1;
    const applyLabel=ry>=S.dist?'APPLY → 1ST DOWN':nextDown>4?`APPLY → 4TH & ${Math.max(1,S.dist-ry)}`:`APPLY → ${nextDown} & ${Math.max(1,S.dist-ry)}`;
    const quickYds=[-10,-5,-3,0,2,3,5,7,10,15,20];
    const quickBtns=quickYds.map(y=>`<button onclick="setResult(${y})" style="flex:1;min-width:30px;padding:9px 2px;border-radius:6px;font-size:11px;font-weight:700;border:none;background:${ry===y?'#2A5090':'#0D1A30'};color:${ry===y?'#CDE':'#6A8AAA'};">${y>0?'+':''}${y}</button>`).join('');
    html+=`<div style="background:#1A2F50;border:2px solid ${GOLD};border-radius:14px;padding:14px 16px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:${GOLD};letter-spacing:1px;margin-bottom:10px;">PLAY #${S.playNum-1} — YARDS GAINED / LOST</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <button onclick="adjustResult(-1)" style="background:#0D1A30;color:#FF8080;border:none;border-radius:8px;padding:14px 18px;font-size:22px;font-weight:700;">−</button>
        <div style="flex:1;text-align:center;">
          <span style="font-size:44px;font-weight:900;color:${ry>0?'#6ECC70':ry<0?'#FF8080':'#fff'};">${ry>0?'+':''}${ry}</span>
          <div style="font-size:11px;color:#6A8AAA;">yards</div>
        </div>
        <button onclick="adjustResult(1)" style="background:#0D1A30;color:#6ECC70;border:none;border-radius:8px;padding:14px 18px;font-size:22px;font-weight:700;">+</button>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;">${quickBtns}</div>
      <div style="display:flex;gap:8px;">
        <button onclick="applyResult()" style="flex:1;padding:14px 0;background:${GOLD};color:${NAVYD};border:none;border-radius:10px;font-weight:900;font-size:14px;">${applyLabel}</button>
        <button onclick="S.resultYds=0;S.phase='normal';saveAll();render();" style="padding:14px 14px;background:#0D1A30;color:#AAA;border:1px solid #333;border-radius:10px;font-size:13px;">Skip</button>
      </div></div>`;
  }

  // Yard line setter
  if(isNormal){
    html+=renderYardSetter(S.absPos,'mainPos','SET YARD LINE');
    html+='<div style="height:12px;"></div>';
  }

  // LOG PLAY button
  if(isNormal){
    html+=`<button onclick="logPlay()" style="width:100%;padding:22px 0;background:${GOLD};color:${NAVYD};border:none;border-radius:14px;font-size:24px;font-weight:900;letter-spacing:2px;box-shadow:0 4px 20px rgba(200,169,81,0.33);margin-bottom:12px;">▶ LOG PLAY #${S.playNum}</button>`;
  }

  // Special plays
  if(isNormal){
    const fourth=S.down===4;
    html+=`<div class="special-row">
      <button onclick="doTurnover('INT')" class="sp-btn" style="background:#0A2A10;border:1px solid rgba(76,175,80,0.33);color:#6ECC70;">🔀 INT</button>
      <button onclick="doTurnover('FUM')" class="sp-btn" style="background:#0A2A10;border:1px solid rgba(76,175,80,0.33);color:#6ECC70;">🔀 FUMBLE</button>
      ${fourth?`
        <button onclick="doPunt()" class="sp-btn" style="background:#1A2A40;border:1px solid rgba(200,169,81,0.33);color:${GOLD};">📤 PUNT</button>
        <button onclick="doFG()" class="sp-btn" style="background:#1A2A40;border:1px solid rgba(200,169,81,0.33);color:${GOLD};">🏈 FG</button>
        <button onclick="doFourthFail()" class="sp-btn" style="background:#2A0A0A;border:1px solid rgba(192,57,43,0.27);color:#FF8080;font-size:12px;">4TH<br>FAIL</button>
      `:''}
    </div>`;
  }

  return html;
}

  S.roster.forEach(p=>{

          ${onPos?`<span style="font-size:11px;background:#1E4A20;color:#6ECC70;padding:2px 8px;border-radius:20px;font-weight:700;">ON ${onPos}</span>`:''}
        </div>
        <div style="font-size:12px;color:#6A8AAA;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <span style="background:#0D1A30;padding:2px 8px;border-radius:6px;">${p.position}</span>
          <span>Limit: ${lim}</span>
          <span style="color:${sc};font-weight:700;">Streak: ${str}</span>
          <span style="color:#4A6A9A;">Total: ${tot}</span>
          ${s==='red'?'<span style="color:#FF8080;font-weight:700;">🔴 PULL</span>':s==='amber'?'<span style="color:#E67E22;font-weight:700;">🟡 WARN</span>':''}
        </div>
      </div>
      <button onclick="openEdit('${p.id}')" style="background:#0D1A30;color:${GOLD};border:1px solid rgba(200,169,81,0.27);border-radius:8px;padding:8px 12px;font-size:13px;">Edit</button>
      <button onclick="deletePlayer('${p.id}')" style="background:#2A0A0A;color:#FF8080;border:1px solid rgba(255,128,128,0.27);border-radius:8px;padding:8px 12px;font-size:13px;">✕</button>
    </div>`;
  });

  html+=`<div style="margin-top:24px;border-top:1px solid #1E3060;padding-top:16px;">`;
  if(!S.showReset){
    html+=`<button onclick="S.showReset=true;render();" style="background:none;color:#5A3030;border:1px solid #5A3030;border-radius:8px;padding:10px 18px;font-size:13px;">🔄 Reset Game Data</button>`;
  } else {
    html+=`<div style="background:#2A0A0A;border:1px solid ${RED};border-radius:10px;padding:16px;">
      <div style="color:#FF8080;font-weight:700;margin-bottom:10px;">Reset all game data? Roster stays.</div>
      <div style="display:flex;gap:10px;">
        <button onclick="resetGame()" style="background:${RED};color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;">Yes, Reset</button>
        <button onclick="S.showReset=false;render();" style="background:#0D1A30;color:#AAA;border:1px solid #333;border-radius:8px;padding:10px 20px;">Cancel</button>
      </div></div>`;
  }
  html+=`</div>`;
  return html;
}

// ── LOG TAB ────────────────────────────────────────────────────────────────────
function renderLog(){
  let html=`<div style="margin-bottom:10px;font-size:13px;color:#8AAAD0;">${S.log.length} plays · Drive ${S.drive}</div>`;
  if(S.log.length===0){
    return html+`<div style="text-align:center;padding:40px 0;color:#3A5580;"><div style="font-size:40px;margin-bottom:12px;">📼</div><div>No plays logged yet.</div></div>`;
  }
  // Group by drive
  const drives={};
  S.log.forEach(e=>{
    if(!drives[e.drive])drives[e.drive]=[];
    drives[e.drive].push(e);
  });
  const typeColors={PUNT:GOLD,'FG ATT':GOLD,'FG-PAT':RED,EP:'#8AAAD0',INT:'#6ECC70',FUM:'#6ECC70','4TH FAIL':'#FF8080'};
  Object.keys(drives).map(Number).sort((a,b)=>a-b).forEach(num=>{
    const plays=drives[num];
    // drive result = last non-normal type
    const special=plays.filter(e=>e.type&&e.type!=='normal');
    const lastSpecial=special[special.length-1];
    const resultBadge=lastSpecial?`<span style="font-size:11px;font-weight:700;color:${typeColors[lastSpecial.type]||'#AAA'};background:#0D1A30;padding:2px 8px;border-radius:6px;">${lastSpecial.type}</span>`:'';
    const rows=plays.map((e,i)=>{
      const tc=typeColors[e.type]||'';
      return `<tr style="background:${i%2===0?CARD:'#182E50'};">
        <td style="padding:7px 6px;color:#6A8AAA;font-weight:700;">${e.n}</td>
        <td style="padding:7px 6px;color:#fff;font-weight:700;">${e.down}</td>
        <td style="padding:7px 6px;color:#CDE;">${e.dist}</td>
        <td style="padding:7px 6px;color:#CDE;white-space:nowrap;">${e.yard}</td>
        ${e.type&&e.type!=='normal'?`<td style="padding:7px 6px;color:${tc};font-size:10px;font-weight:700;white-space:nowrap;">${e.type}</td>`:'<td style="padding:7px 6px;"></td>'}
        <td style="padding:7px 6px;color:#EEE;white-space:nowrap;">${e.FE}</td>
        <td style="padding:7px 6px;color:#EEE;white-space:nowrap;">${e.DT}</td>
        <td style="padding:7px 6px;color:#EEE;white-space:nowrap;">${e.N}</td>
        <td style="padding:7px 6px;color:#EEE;white-space:nowrap;">${e.BE}</td>
      </tr>`;
    }).join('');
    html+=`<div style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-size:12px;font-weight:700;color:${GOLD};letter-spacing:1px;">DRIVE ${num}</span>
        ${resultBadge}
        <span style="font-size:11px;color:#4A6A9A;">${plays.length} plays</span>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="background:#111E36;">
            ${['#','DWN','DIST','YARD','TYPE','FE','DT','N','BE'].map(h=>`<th style="padding:8px 6px;text-align:left;color:#5A7AAA;font-weight:700;font-size:10px;border-bottom:1px solid ${BRD};white-space:nowrap;">${h}</th>`).join('')}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  return html;
}

// ── Assign Sheet ───────────────────────────────────────────────────────────────
function renderAssignSheet(){
  const pos=S.assignPos;
  if(!pos)return;
  const cur=S.onField[pos];
  const curP=cur?getP(cur):null;
  const takenElsewhere=id=>Object.entries(S.onField).some(([p,v])=>v===id&&p!==pos);
  const avail=S.roster.filter(p=>!takenElsewhere(p.id));

  const pullBtn=cur?`<button onclick="pullPlayer('${pos}');saveAll();render();" style="width:100%;padding:15px 0;margin-bottom:12px;background:#2A0A0A;border:1px solid rgba(192,57,43,0.33);border-radius:12px;color:#FF8080;font-weight:700;font-size:15px;">Pull ${curP?.name} — streak resets to 0</button>`:'';

  const playerBtns=avail.map(p=>{
    const s=getStatus(p.id),lim=getLimit(p.id),str=getStreak(p.id),tot=getTotal(p.id);
    const isCur=cur===p.id;
    const bc=isCur?'#C8A951':s==='red'?RED:s==='amber'?AMBER:BRD;
    const bg=isCur?'#1E3A60':s==='red'?'#3A0A0A':s==='amber'?'#3A2000':'#0D1A30';
    const nc=isCur?'#C8A951':s==='red'?'#FF8080':s==='amber'?'#FFB347':'#fff';
    const sc=s==='red'?RED:s==='amber'?AMBER:'#8AAAD0';
    return `<button onclick="assignPlayer('${pos}','${p.id}');saveAll();render();" 
      style="padding:14px 18px;border-radius:12px;border:2px solid ${bc};background:${bg};display:flex;align-items:center;justify-content:space-between;width:100;text-align:left;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;background:#1B2A4A;color:#C8A951;padding:3px 8px;border-radius:6px;font-weight:700;">${p.position}</span>
        <span style="font-size:18px;font-weight:700;color:${nc};">${p.closer?'⭐ ':''}${p.name}</span>
        ${isCur?'<span style="font-size:11px;color:#C8A951;font-weight:700;">← ON</span>':''}
      </div>
      <div style="text-align:right;">
        <div style="font-size:15px;font-weight:700;color:${sc};">${str}<span style="font-size:11px;opacity:0.6;">/${lim}</span></div>
        <div style="font-size:11px;color:#4A6A9A;">${tot} total</div>
        ${s==='red'?'<div style="font-size:10px;color:#FF6060;font-weight:700;">PULL</div>':s==='amber'?'<div style="font-size:10px;color:#E67E22;font-weight:700;">WARN</div>':''}
      </div>
    </button>`;
  }).join('');

  const sheet=`<div class="sheet-overlay" onclick="S.assignPos=null;saveAll();render();">
    <div class="sheet" onclick="event.stopPropagation();">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div>
          <span style="font-size:15px;font-weight:700;color:#C8A951;">${pos}</span>
          <span style="font-size:13px;color:#8AAAD0;margin-left:8px;">${cur?'Current: '+curP?.name:'Empty — select player'}</span>
        </div>
        <button onclick="S.assignPos=null;saveAll();render();" style="background:none;border:1px solid #2E4A80;color:#8AAAD0;border-radius:8px;padding:6px 14px;font-size:14px;">✕</button>
      </div>
      ${pullBtn}
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${avail.length===0?'<div style="text-align:center;padding:20px;color:#3A5580;">No players available — add in Setup</div>':playerBtns}
      </div>
    </div>
  </div>`;
  document.getElementById('sheet-container').innerHTML=sheet;
}

// ── Player Modal ───────────────────────────────────────────────────────────────
function openAdd(){
  S.formName=''; S.formPosition='FE'; S.formLimit=6; S.formCloser=false;
  S.editId=null; S.showAdd=true; renderModal();
}
function openEdit(id){
  const p=getP(id);
  if(!p)return;
  S.formName=p.name; S.formPosition=p.position; S.formLimit=p.limit||6; S.formCloser=p.closer||false;
  S.editId=id; S.showAdd=true; renderModal();
}
function deletePlayer(id){
  S.roster=S.roster.filter(p=>p.id!==id);
  POS.forEach(pos=>{if(S.onField[pos]===id)S.onField[pos]=null;});
  saveAll(); render();
}
function savePlayer(){
  const name=document.getElementById('modal-name')?.value?.trim();
  if(!name)return;
  S.formName=name;
  if(S.editId){
    S.roster=S.roster.map(p=>p.id===S.editId?{...p,name:S.formName,position:S.formPosition,limit:S.formLimit,closer:S.formCloser}:p);
  } else {
    S.roster.push({id:uid(),name:S.formName,position:S.formPosition,limit:S.formLimit,closer:S.formCloser});
  }
  S.showAdd=false; S.editId=null;
  saveAll(); render();
}
function closeModal(){S.showAdd=false;document.getElementById('modal-container').innerHTML='';render();}
function modalSetPos(pos){S.formPosition=pos;renderModal();}
function modalAdjLimit(d){S.formLimit=Math.max(1,S.formLimit+d);renderModal();}
function modalToggleCloser(){S.formCloser=!S.formCloser;renderModal();}

function renderModal(){
  if(!S.showAdd){document.getElementById('modal-container').innerHTML='';return;}
  const lim=S.formLimit;
  const posBtns=POS.map(p=>`<button onclick="modalSetPos('${p}')" style="flex:1;padding:12px 0;border-radius:8px;font-weight:700;font-size:15px;border:none;background:${S.formPosition===p?'#C8A951':'#0D1A30'};color:${S.formPosition===p?'#111E36':'#6A8AAA'};">${p}</button>`).join('');

  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div style="font-size:18px;font-weight:700;color:#C8A951;margin-bottom:20px;">${S.editId?'Edit Player':'Add Player'}</div>
      <label style="font-size:11px;color:#8AAAD0;font-weight:700;letter-spacing:1px;">NAME</label>
      <input type="text" id="modal-name" value="${S.formName}" placeholder="Player name" autofocus>
      <label style="font-size:11px;color:#8AAAD0;font-weight:700;letter-spacing:1px;display:block;margin-top:16px;margin-bottom:6px;">POSITION</label>
      <div style="display:flex;gap:8px;margin-bottom:16px;">${posBtns}</div>
      <label style="font-size:11px;color:#8AAAD0;font-weight:700;letter-spacing:1px;">STREAK LIMIT — pull after this many plays in a row</label>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px;margin-bottom:4px;">
        <button onclick="modalAdjLimit(-1)" style="background:#0D1A30;color:#AAC;border:none;border-radius:8px;padding:10px 18px;font-size:20px;">−</button>
        <span style="font-size:32px;font-weight:700;color:#fff;min-width:50px;text-align:center;">${lim}</span>
        <button onclick="modalAdjLimit(1)" style="background:#0D1A30;color:#AAC;border:none;border-radius:8px;padding:10px 18px;font-size:20px;">+</button>
      </div>
      <div style="font-size:11px;color:#6A8AAA;margin-bottom:18px;">🟡 Warn at ${Math.max(1,lim-2)} · 🔴 Pull at ${lim} · Resets when pulled</div>
      <button onclick="modalToggleCloser()" style="display:flex;align-items:center;gap:10px;background:${S.formCloser?'#1E3A20':'#0D1A30'};border:1px solid ${S.formCloser?'#4CAF50':'#2E4A80'};border-radius:10px;padding:12px 16px;width:100%;margin-bottom:20px;">
        <span style="font-size:20px;">${S.formCloser?'⭐':'☆'}</span>
        <div style="text-align:left;">
          <div style="font-size:14px;font-weight:700;color:${S.formCloser?'#6ECC70':'#8AAAD0'};">Closer / Momentum Role</div>
          <div style="font-size:11px;color:#6A8AAA;">Auto-alerts on 3rd & 7+, 4th down, red zone</div>
        </div>
      </button>
      <div style="display:flex;gap:10px;">
        <button onclick="savePlayer()" style="flex:1;padding:14px 0;background:#C8A951;color:#111E36;border:none;border-radius:10px;font-weight:700;font-size:16px;">${S.editId?'Save Changes':'Add to Roster'}</button>
        <button onclick="closeModal()" style="padding:14px 20px;background:#0D1A30;color:#AAA;border:1px solid #333;border-radius:10px;font-size:15px;">Cancel</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-name').focus();
}

// ── Main render ────────────────────────────────────────────────────────────────
function switchTab(t){
  S.tab=t; S.assignPos=null;
  document.getElementById('sheet-container').innerHTML='';
  saveAll(); render();
}

function render(){
  renderHeader();
  const content=document.getElementById('content');
  if(S.tab==='game') content.innerHTML=renderGame();
  else if(S.tab==='setup') content.innerHTML=renderSetup();
  else content.innerHTML=renderLog();
  // render sheet if assignPos set
  if(S.assignPos) renderAssignSheet();
  else if(!S.showAdd) document.getElementById('sheet-container').innerHTML='';
  if(S.showAdd) renderModal();
  else document.getElementById('modal-container').innerHTML='';
}

// ── Boot ───────────────────────────────────────────────────────────────────────
loadAll();
render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Friday_Night_Tracker/sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
